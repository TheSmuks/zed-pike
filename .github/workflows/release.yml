name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.0.2). Defaults to the most recent v* tag."
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  build-linux:
    name: build linux host + wasm bridge
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target x86_64-unknown-linux-gnu
          rustup target add wasm32-wasip2
      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-linux
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace
      - name: Build pike-lsp (linux)
        run: cargo build -p pike-lsp --release
      - name: Build zed-pike-bridge (wasm32-wasip2)
        run: cargo build -p zed-pike-bridge --target wasm32-wasip2 --release
      - name: Stage linux artifacts
        run: |
          set -euo pipefail
          mkdir -p out
          STAGE="out/pike-lsp-${TAG}-x86_64-unknown-linux-gnu"
          mkdir -p "${STAGE}"
          cp target/release/pike-lsp "${STAGE}/pike-lsp"
          chmod +x "${STAGE}/pike-lsp"
          tar -C out -czf "out/pike-lsp-${TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            "pike-lsp-${TAG}-x86_64-unknown-linux-gnu"
          cp target/wasm32-wasip2/release/zed_pike_bridge.wasm \
            "out/zed-pike-bridge-${TAG}.wasm"
      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: out/

  build-windows:
    name: build windows host
    runs-on: windows-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (windows)
        run: |
          rustup toolchain install stable --profile minimal --target x86_64-pc-windows-msvc
      - name: Cache cargo target (windows)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-windows
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        shell: bash
      - name: cargo clippy
        run: cargo clippy -p pike-lsp --all-targets -- -D warnings
      - name: cargo test (pike-lsp)
        run: cargo test -p pike-lsp
      - name: Build pike-lsp (windows)
        run: cargo build -p pike-lsp --release
      - name: Stage windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          STAGE="out/pike-lsp-${TAG}-x86_64-pc-windows-msvc"
          mkdir -p "${STAGE}"
          cp target/release/pike-lsp.exe "${STAGE}/pike-lsp.exe"
          (cd out && zip -r "pike-lsp-${TAG}-x86_64-pc-windows-msvc.zip" \
            "pike-lsp-${TAG}-x86_64-pc-windows-msvc")
      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: out/

  publish:
    name: publish github release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            INPUT_TAG="${{ github.event.inputs.tag }}"
            if [ -n "${INPUT_TAG}" ]; then
              TAG="${INPUT_TAG}"
            else
              TAG=$(git ls-remote --tags --sort=-version:refname origin | \
                head -n1 | awk -F/ '{print $NF}')
            fi
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release assets
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p out
          # Flatten both artifact directories into out/.
          find artifacts -type f -name "pike-lsp-*" -exec cp {} out/ \;
          find artifacts -type f -name "zed-pike-bridge-*" -exec cp {} out/ \;
          ls -lh out/
      - name: Compute SHA-256 sums
        run: |
          set -euo pipefail
          (cd out && sha256sum *.tar.gz *.zip *.wasm > SHA256SUMS)
          cat out/SHA256SUMS
      - name: Render release notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          {
            echo "# ${TAG}"
            echo
            echo "Release of the \`zed-pike\` extension and the bundled \`pike-lsp\`."
            echo
            echo "## Assets"
            echo
            echo "| Asset | SHA-256 |"
            echo "|-------|---------|"
            awk '{printf "| `%s` | `%s` |\n", $2, $1}' out/SHA256SUMS
            echo
            echo "## Notes"
            echo
            echo "- \`zed-pike-bridge-<version>.wasm\` is the wasm32-wasip2 Zed extension module."
            echo "- \`pike-lsp-<version>-x86_64-unknown-linux-gnu.tar.gz\` contains the host binary for Linux."
            echo "- \`pike-lsp-<version>-x86_64-pc-windows-msvc.zip\` contains the host binary for Windows."
            echo "- See \`CHANGELOG.md\` for user-visible change history."
          } > out/RELEASE.md
          cat out/RELEASE.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          cd out
          ASSETS=()
          for f in *.tar.gz *.zip *.wasm; do
            [ -e "$f" ] && ASSETS+=("$f")
          done
          gh release create "${TAG}" \
            --repo TheSmuks/zed-pike \
            --title "${TAG}" \
            --notes-file RELEASE.md \
            "${ASSETS[@]}"