name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CC: gcc
  CARGO_TERM_COLOR: always

jobs:
  commitlint:
    name: commitlint (conventional commits)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@20 \
            @commitlint/config-conventional@20
      - name: Run commitlint on PR commits
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint --from="${{ github.event.pull_request.base.sha }}~1" \
            --to="${{ github.event.pull_request.head.sha }}" \
            --verbose
      - name: Run commitlint on last commit (push)
        if: github.event_name == 'push'
        run: npx commitlint --from=HEAD~1 --to=HEAD --verbose

  branch-name:
    name: branch-name (conventional branches)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate branch name
        run: bash scripts/check-branch-name.sh "${GITHUB_REF_NAME}"

  test:
    name: cargo test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target x86_64-unknown-linux-gnu
          rustup target add wasm32-wasip2
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  build:
    name: build artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target x86_64-unknown-linux-gnu
          rustup target add wasm32-wasip2
      - name: Build pike-lsp (host)
        run: cargo build -p pike-lsp --release
      - name: Build zed-pike-bridge (wasm32-wasip2)
        run: cargo build -p zed-pike-bridge --target wasm32-wasip2 --release
      - name: Upload pike-lsp binary
        uses: actions/upload-artifact@v4
        with:
          name: pike-lsp-x86_64-unknown-linux-gnu
          path: target/release/pike-lsp
      - name: Upload zed-pike-bridge.wasm
        uses: actions/upload-artifact@v4
        with:
          name: zed-pike-bridge.wasm
          path: target/wasm32-wasip2/release/zed_pike_bridge.wasm

  perf:
    name: performance SLO check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target x86_64-unknown-linux-gnu
          rustup target add wasm32-wasip2
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build pike-lsp
        run: cargo build -p pike-lsp --release
      - name: Criterion benches
        run: cargo bench -p pike-lsp --bench analysis -- --output-format bencher
      - name: RSS / startup smoke
        run: bash scripts/perf-smoke.sh target/release/pike-lsp
